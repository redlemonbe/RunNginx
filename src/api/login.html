<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RunNginx — Login</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--text3:#6e7681;--accent:#58a6ff;--accent2:#1f6feb;--red:#f85149}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:36px 40px;width:360px;max-width:90vw}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.logo-icon{width:36px;height:36px;background:var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.logo-name{font-size:18px;font-weight:700}
h2{font-size:16px;font-weight:600;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.field{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .12s}
input:focus{border-color:var(--accent)}
.err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.btn{width:100%;background:var(--accent2);border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;padding:10px;cursor:pointer;transition:background .12s;margin-top:6px}
.btn:hover{background:#388bfd}
.btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
    <span class="logo-name">RunNginx</span>
  </div>
  <h2>Management Console</h2>
  <p class="sub">Sign in to continue</p>
  <div class="err" id="err">Invalid username or password</div>
  <div class="field">
    <label>Username</label>
    <input id="u" type="text" placeholder="admin" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input id="p" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="login()">Sign in</button>
</div>
<script>
'use strict';
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
async function login() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  if (!u || !p) return;
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    if (r.ok) {
      window.location.href = '/ui';
    } else {
      err.textContent = 'Invalid username or password';
      err.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch(e) {
    err.textContent = 'Connection failed: ' + e.message;
    err.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
